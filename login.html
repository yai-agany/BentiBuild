<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BentiBuild</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="form-container">
            <h1>Login to BentiBuild</h1>
            <p>Access your community profile and bottle collection dashboard.</p>
            <div id="login-message"></div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email address</label>
                    <input type="email" id="login-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required>
                </div>

                <button type="submit" class="cta-button">Login</button>
            </form>
            <p class="small-text">New here? <a href="signup.html">Create an account</a></p>
        </section>
    </main>
    <footer>
        <nav class="footer-nav">
            <ul class="footer-nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="method.html">The Method</a></li>
                <li><a href="map.html">Bottle Map</a></li>
                <li><a href="builders.html">Builders</a></li>
                <li><a href="sales.html">Bottle Sales</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="contact-links">
            <a href="tel:+211924313974" class="contact-button">Call Us</a>
            <a href="https://wa.me/211924313974" class="contact-button whatsapp">WhatsApp</a>
            <a href="https://www.facebook.com/yaiagany" class="contact-button social facebook" target="_blank" rel="noopener">Facebook</a>
            <a href="https://x.com/yucci211" class="contact-button social x" target="_blank" rel="noopener">X</a>
            <a href="https://www.instagram.com/yucci211" class="contact-button social instagram" target="_blank" rel="noopener">Instagram</a>
            <a href="https://www.tiktok.com/@yucci211" class="contact-button social tiktok" target="_blank" rel="noopener">TikTok</a>
        </div>
        <p>&copy; 2026 BentiBuild. All rights reserved.</p>
    </footer>
    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script>
        (function(){
            var form = document.getElementById('loginForm');
            if(!form) return;
            form.addEventListener('submit', async function(e){
                e.preventDefault();
                var email = document.getElementById('login-email').value;
                var password = document.getElementById('login-password').value;
                var messageDiv = document.getElementById('login-message');
                try{
                    var result = await authManager.login(email, password);
                    if(result && result.success){
                        messageDiv.className = 'success';
                        messageDiv.textContent = 'Login successful! Redirecting...';
                        var intended = localStorage.getItem('intendedUrl'); localStorage.removeItem('intendedUrl');
                        setTimeout(function(){ window.location.href = intended || 'index.html'; }, 900);
                    } else {
                        messageDiv.className = 'error';
                        messageDiv.textContent = result && result.message ? result.message : 'Login failed';
                    }
                }catch(err){
                    messageDiv.className = 'error';
                    messageDiv.textContent = 'Login failed. Please try again.';
                    console.error(err);
                }
            });
        })();
    </script>
    <script src="script.js"></script>
</body>
</html>
