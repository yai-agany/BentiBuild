<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BentiBuild</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="form-container">
            <h1>Sign Up for BentiBuild</h1>
            <p>Join as a collector, builder, or bottle supplier.</p>
            <div id="signup-message"></div>
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email address</label>
                    <input type="email" id="signup-email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="signup-phone">Phone Number</label>
                    <input type="tel" id="signup-phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="signup-role">Role</label>
                    <select id="signup-role" name="role" required>
                        <option value="collector">Collector</option>
                        <option value="builder">Builder</option>
                        <option value="supplier">Bottle Supplier</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" name="password" required>
                </div>

                <button type="submit" class="cta-button">Create Account</button>
            </form>
            <p class="small-text">Already have an account? <a href="login.html">Login here</a></p>
        </section>
    </main>
    <footer>
        <nav class="footer-nav">
            <ul class="footer-nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="method.html">The Method</a></li>
                <li><a href="map.html">Bottle Map</a></li>
                <li><a href="builders.html">Builders</a></li>
                <li><a href="sales.html">Bottle Sales</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="contact-links">
            <a href="tel:+211924313974" class="contact-button">Call Us</a>
            <a href="https://wa.me/211924313974" class="contact-button whatsapp">WhatsApp</a>
            <a href="https://www.facebook.com/yaiagany" class="contact-button social facebook" target="_blank" rel="noopener">Facebook</a>
            <a href="https://x.com/yucci211" class="contact-button social x" target="_blank" rel="noopener">X</a>
            <a href="https://www.instagram.com/yucci211" class="contact-button social instagram" target="_blank" rel="noopener">Instagram</a>
            <a href="https://www.tiktok.com/@yucci211" class="contact-button social tiktok" target="_blank" rel="noopener">TikTok</a>
        </div>
        <p>&copy; 2026 BentiBuild. All rights reserved.</p>
    </footer>
    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script>
        (function(){
            var form = document.getElementById('signupForm');
            if(!form) return;
            form.addEventListener('submit', async function(e){
                e.preventDefault();
                var name = document.getElementById('signup-name').value;
                var email = document.getElementById('signup-email').value;
                var phone = document.getElementById('signup-phone').value;
                var password = document.getElementById('signup-password').value;
                var role = document.getElementById('signup-role').value;
                var messageDiv = document.getElementById('signup-message');
                try{
                    var result = await authManager.signup(name, email, phone, password, role);
                    if(result && result.success){
                        messageDiv.className = 'success';
                        messageDiv.textContent = 'Signup successful! Redirecting...';
                        setTimeout(function(){ window.location.href = 'index.html'; }, 1200);
                    } else {
                        messageDiv.className = 'error';
                        messageDiv.textContent = result && result.message ? result.message : 'Signup failed';
                    }
                }catch(err){
                    messageDiv.className = 'error';
                    messageDiv.textContent = 'Error creating account. Please try again.';
                    console.error(err);
                }
            });
        })();
    </script>
    <script src="script.js"></script>
</body>
</html>
